services:
  mortgage-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mortgage-broker-agent

    ports:
      - "5001:5000"

    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY to a strong random value before starting}
      FLASK_ENV: ${FLASK_ENV:-production}
      DEBUG: ${DEBUG:-false}
      PORT: 5000
      DB_PATH: /app/data/mortgage.db
      DOCS_OUTPUT_PATH: /app/generated_docs
      REDIS_URL: redis://redis:6379/0

    volumes:
      - ./data:/app/data
      - ./generated_documents:/app/generated_docs

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - mortgage-network


  redis:
    image: redis:7-alpine
    container_name: mortgage-redis

    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - redis-data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - mortgage-network


  nginx:
    image: nginx:alpine
    container_name: mortgage-nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    depends_on:
      - mortgage-agent

    restart: unless-stopped

    networks:
      - mortgage-network

    profiles:
      - production


networks:
  mortgage-network:
    driver: bridge

volumes:
  redis-data:
