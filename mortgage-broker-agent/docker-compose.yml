version: "3.9"

services:
  mortgage-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mortgage-broker-agent
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PORT=5000
      - FLASK_ENV=${FLASK_ENV:-production}
      - DEBUG=${DEBUG:-false}
    volumes:
      # Persist generated documents outside the container
      - mortgage_docs:/app/generated_docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - mortgage-network

  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: mortgage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - mortgage-agent
    restart: unless-stopped
    networks:
      - mortgage-network
    profiles:
      - production  # Only start with: docker compose --profile production up

volumes:
  mortgage_docs:
    driver: local
    driver_opts:
      type: none
      device: ${DOCS_OUTPUT_PATH:-./generated_documents}
      o: bind

networks:
  mortgage-network:
    driver: bridge
