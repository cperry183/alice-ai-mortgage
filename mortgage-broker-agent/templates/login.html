<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MortgageAI — Broker Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1f35;
            --navy-mid: #1a3a5c;
            --blue: #2563eb;
            --blue-light: #3b82f6;
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --cream: #faf8f4;
            --warm-white: #fffef9;
            --text: #1a1a2e;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #dc2626;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Background texture */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(37, 99, 235, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(201, 168, 76, 0.08) 0%, transparent 55%);
            pointer-events: none;
        }

        /* Decorative grid */
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: white;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .logo-text span { color: var(--gold-light); }

        .header-link {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-link:hover { color: var(--gold-light); }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201, 168, 76, 0.12);
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: var(--gold-light);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            color: white;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.5;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(12px);
        }

        /* Error alert */
        .error-alert {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.85rem;
            color: #fca5a5;
            line-height: 1.4;
        }

        .error-alert svg { flex-shrink: 0; margin-top: 1px; }

        /* Form */
        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.03em;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 11px 12px 11px 38px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: white;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255,255,255,0.2);
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: rgba(37, 99, 235, 0.7);
            background: rgba(37, 99, 235, 0.08);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        input[type="email"].error,
        input[type="password"].error {
            border-color: rgba(220, 38, 38, 0.6);
        }

        /* Show password toggle */
        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.3);
            padding: 2px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .toggle-pw:hover { color: rgba(255,255,255,0.7); }

        /* Submit */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--navy-mid) 0%, var(--blue) 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4); }
        .submit-btn:active { transform: translateY(0); }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.25rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .divider span {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Footer note */
        .footer-note {
            text-align: center;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.3);
            line-height: 1.6;
        }

        .footer-note a {
            color: var(--gold-light);
            text-decoration: none;
        }

        .footer-note a:hover { text-decoration: underline; }

        /* Security badges */
        .security-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 1.5rem;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.25);
        }

        /* Spinner for submit */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">Mortgage<span>AI</span></div>
    </a>
    <a href="/" class="header-link">← Back to Application</a>
</header>

<main class="main">
    <div class="login-container">

        <div class="login-header">
            <div class="badge">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Broker Portal
            </div>
            <h1>Welcome back</h1>
            <p>Sign in to access your mortgage broker dashboard</p>
        </div>

        <div class="card">

            {% if error %}
            <div class="error-alert">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" onsubmit="handleSubmit(event)">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="broker@example.com"
                            value="{{ email or '' }}"
                            required
                            autocomplete="email"
                            {% if error %}class="error"{% endif %}
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                            {% if error %}class="error"{% endif %}
                        >
                        <button type="button" class="toggle-pw" onclick="togglePassword()" id="toggleBtn" title="Show password">
                            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btnText">Sign In to Dashboard</span>
                    <svg id="btnArrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>

            </form>

            <div class="divider"><span>Secured with</span></div>

            <div class="security-row">
                <div class="security-badge">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Session Auth
                </div>
                <div class="security-badge">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    bcrypt Hashed
                </div>
                <div class="security-badge">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Audit Logged
                </div>
            </div>

        </div>

        <div class="footer-note" style="margin-top: 1.25rem;">
            First time? <a href="/setup">Create your broker account</a>
        </div>

    </div>
</main>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        icon.innerHTML = isHidden
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    function handleSubmit(e) {
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const btnArrow = document.getElementById('btnArrow');

        spinner.style.display = 'block';
        btnText.textContent = 'Signing in…';
        btnArrow.style.display = 'none';
        btn.disabled = true;
    }

    // Auto-focus email if empty, password if email is pre-filled
    window.addEventListener('DOMContentLoaded', () => {
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        if (email.value) {
            password.focus();
        } else {
            email.focus();
        }
    });
</script>

</body>
</html>
