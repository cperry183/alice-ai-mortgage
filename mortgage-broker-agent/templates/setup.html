<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrokerGen AI — Admin Setup</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 24px; }
        .card { background: white; padding: 38px; border-radius: 8px; box-shadow: 0 4px 18px rgba(15, 23, 42, 0.1); width: 100%; max-width: 430px; box-sizing: border-box; }
        h1 { font-size: 23px; color: #1e293b; margin: 0 0 8px; letter-spacing: -0.4px; }
        p { color: #64748b; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #2563eb; }
        .error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 18px; }
        button { width: 100%; padding: 12px; background: #0f172a; color: white; border: 0; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .footer { margin-top: 18px; text-align: center; }
        .footer a { color: #2563eb; font-size: 13px; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Admin Account</h1>
        <p>This one-time setup creates the first administrator. After an account exists, this page redirects to login.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/setup">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit">Create Admin</button>
        </form>

        <div class="footer">
            <a href="/login">Back to login</a>
        </div>
    </div>
</body>
</html>
