<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrokerGen AI — Create Account</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 24px; }
        .card { background: white; padding: 38px; border-radius: 8px; box-shadow: 0 4px 18px rgba(15, 23, 42, 0.1); width: 100%; max-width: 430px; box-sizing: border-box; }
        h1 { font-size: 23px; color: #1e293b; margin: 0 0 8px; letter-spacing: -0.4px; }
        p { color: #64748b; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #2563eb; }
        .error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 18px; }
        .notice { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 18px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: 0; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .footer { margin-top: 18px; text-align: center; }
        .footer a { color: #2563eb; font-size: 13px; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Broker Account</h1>
        <p>New broker users can create an account here and access the dashboard immediately.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if not signup_enabled %}
        <div class="notice">Public signup is disabled. Ask an administrator to create your account.</div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ name }}" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ email }}" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" {% if not signup_enabled %}disabled{% endif %}>Create Account</button>
        </form>

        <div class="footer">
            <a href="/login">Already have an account?</a>
        </div>
    </div>
</body>
</html>
