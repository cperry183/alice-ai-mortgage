apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: loan-agent
  template:
    metadata:
      labels:
        app: loan-agent
    spec:
      containers:
      - name: loan-agent
        image: your-dockerhub/loan-agent:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: loan-agent
spec:
  selector:
    app: loan-agent
  ports:
    - port: 80
      targetPort: 8000
